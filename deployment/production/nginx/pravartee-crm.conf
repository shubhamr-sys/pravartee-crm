# Pravartee CRM — Nginx reverse proxy (HTTPS)
# Replace CRM_DOMAIN with your hostname, e.g. crm.pravarteesales.com
#
# Install:
#   sudo cp deployment/production/nginx/pravartee-crm.conf /etc/nginx/sites-available/pravartee-crm
#   sudo ln -sf /etc/nginx/sites-available/pravartee-crm /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream pravartee_backend {
    server 127.0.0.1:8084;
    keepalive 32;
}

upstream pravartee_frontend {
    server 127.0.0.1:3034;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name CRM_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name CRM_DOMAIN;

    # Certbot fills these paths after: sudo certbot --nginx -d CRM_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/CRM_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/CRM_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Django API + admin + static (collected)
    location /api/ {
        proxy_pass http://pravartee_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://pravartee_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        alias /opt/pravartee-crm/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Next.js frontend (all other routes)
    location / {
        proxy_pass http://pravartee_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
    }
}
